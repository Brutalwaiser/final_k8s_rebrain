apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: db
  labels:
    app: db
type: Opaque
stringData:
  # root-пароль MySQL и пароль прикладного пользователя.
  # Пароль пользователя ДОЛЖЕН совпадать с тем, что лежит в final/librespeed-secret.
  MYSQL_ROOT_PASSWORD: "rootSecret123"
  MYSQL_PASSWORD: "speedSecret123"
